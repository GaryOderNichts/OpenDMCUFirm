name: Build

on: [push, pull_request]

jobs:
  build-binary:
    runs-on: ubuntu-latest
    container: garyodernichts/dmcubuilder

    steps:
      - uses: actions/checkout@main

      - name: Build binary
        env:
          WINEPREFIX: /root/.wine
        run: make PREFIX='wine /gnu-68hc1x/app/bin/m6811-elf-' SUFFIX='.exe'

      - uses: actions/upload-artifact@main
        with:
          name: OpenDMCUFirm
          path: dmcu.d.hex
          if-no-files-found: error
